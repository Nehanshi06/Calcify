<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcify</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div class="calculator-card">
            <div class="top-bar">
                <div class="brand">Calcify</div>
                <div class="tabs">
                    <button class="tab-btn active" onclick="showTab('calculator')">Calculator</button>
                    <button class="tab-btn" onclick="showTab('converter')">Converter</button>
                    <button class="tab-btn icon-btn" onclick="showTab('history')" title="History">🕘</button>
                </div>
            </div>

            <div id="calculatorTab" class="tab-content active-tab">
                <div class="display">
                    <div id="expression">0</div>
                    <div id="result">0</div>
                </div>
                <div class="buttons">
                    <button class="gray" onclick="clearDisplay()">AC</button>
                    <button class="gray" onclick="deleteLast()">DEL</button>
                    <button class="gray" onclick="appendValue('%')">%</button>
                    <button class="operator" onclick="appendValue('/')">÷</button>
                    
                    <button onclick="appendValue('7')">7</button>
                    <button onclick="appendValue('8')">8</button>
                    <button onclick="appendValue('9')">9</button>
                    <button class="operator" onclick="appendValue('*')">×</button>
                    
                    <button onclick="appendValue('4')">4</button>
                    <button onclick="appendValue('5')">5</button>
                    <button onclick="appendValue('6')">6</button>
                    <button class="operator" onclick="appendValue('-')">−</button>
                    
                    <button onclick="appendValue('1')">1</button>
                    <button onclick="appendValue('2')">2</button>
                    <button onclick="appendValue('3')">3</button>
                    <button class="operator" onclick="appendValue('+')">+</button>
                    
                    <button class="zero-btn" onclick="appendValue('0')">0</button>
                    <button onclick="appendValue('.')">.</button>
                    <button class="equal" onclick="calculate()">=</button>
                </div>
            </div>

            <!-- Converter Grid Tab -->
            <div id="converterGridTab" class="tab-content">
                <div class="converter-main">
                    <div class="converter-grid full-grid">
                        <div class="converter-item" onclick="openSpecificConverter('currency')">
                            <div class="icon">💱</div>
                            <p>Currency</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('length')">
                            <div class="icon">📏</div>
                            <p>Length</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('age')">
                            <div class="icon">🎂</div>
                            <p>Age</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('mass')">
                            <div class="icon">⚖️</div>
                            <p>Mass</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('area')">
                            <div class="icon">⬛</div>
                            <p>Area</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('time')">
                            <div class="icon">⏰</div>
                            <p>Time</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('data')">
                            <div class="icon">💾</div>
                            <p>Data</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('discount')">
                            <div class="icon">🏷️</div>
                            <p>Discount</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('volume')">
                            <div class="icon">📦</div>
                            <p>Volume</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('numeral')">
                            <div class="icon">🔁</div>
                            <p>Numeral</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('speed')">
                            <div class="icon">🚀</div>
                            <p>Speed</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('temperature')">
                            <div class="icon">🌡️</div>
                            <p>Temperature</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('bmi')">
                            <div class="icon">⚕️</div>
                            <p>BMI</p>
                        </div>
                        <div class="converter-item" onclick="openSpecificConverter('gst')">
                            <div class="icon">🧾</div>
                            <p>GST</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PERFECT Converter Workspace -->
            <div id="converterWorkspaceTab" class="tab-content">
                <div class="converter-workspace-full">
                    <div class="workspace-header">
                        <button class="back-btn" onclick="showConverterGrid()">← Back</button>
                        <h3 id="converterTitle">Select Converter</h3>
                    </div>
                    
                    <!-- Universal Input Layout -->
                    <div id="inputContainer">

    <!-- INPUT -->
    <div class="input-group full-width">
        <label id="inputLabel">Enter Value</label>
        <input type="text" id="inputValue" placeholder="Type value here">
    </div>

    <!-- FROM -->
    <div class="convert-box">
        <label>FROM</label>
        <select id="fromUnit"></select>
    </div>

    <!-- CENTER ARROW -->
    <div class="arrow-center">
        <div class="big-arrow">→</div>
        <div class="conversion-text">
            <span id="fromDisplay">FROM</span>
            <span>to</span>
            <span id="toDisplay">TO</span>
        </div>
    </div>

    <!-- TO -->
    <div class="convert-box">
        <label>TO</label>
        <select id="toUnit"></select>
    </div>

</div>
                    
                    <!-- Age Converter (Untouched) -->
                    <div id="ageSection" style="display: none;">
                        <div class="date-input-group">
                            <label>Birth Date</label>
                            <div class="date-selector-row">
                                <select id="birthYear" class="date-dropdown"></select>
                                <select id="birthMonth" class="date-dropdown"></select>
                                <select id="birthDay" class="date-dropdown"></select>
                            </div>
                        </div>
                        <div class="date-input-group">
                            <label>To Date <span class="auto-today">(Auto: Today)</span></label>
                            <div class="date-selector-row">
                                <select id="toYear" class="date-dropdown"></select>
                                <select id="toMonth" class="date-dropdown"></select>
                                <select id="toDay" class="date-dropdown"></select>
                            </div>
                        </div>
                    </div>
                    
                    <button class="convert-main-btn" onclick="convertNow()">Convert</button>
                    <div class="result-container">
                        <h2 id="convertResult">Result: </h2>
                    </div>
                </div>
            </div>

            <div id="historyTab" class="tab-content">
                <div class="history-box full-box">
                    <h2>Calculation History</h2>
                    <ul id="historyList"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
