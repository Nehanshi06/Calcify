<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcify</title>

    <link rel="icon" type="image/png" href="favicon-32x32.png">

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="main-container">

    <div class="calculator-card">

        <!-- TOP BAR -->

        <div class="top-bar">

            <div class="brand">Calcify</div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('calculator')">
                    Calculator
                </button>

                <button class="tab-btn" onclick="showTab('converter')">
                    Converter
                </button>

                <button class="tab-btn icon-btn" onclick="showTab('history')">
                    🕘
                </button>
            </div>

        </div>

        <!-- CALCULATOR -->

        <div id="calculatorTab" class="tab-content active-tab">

            <div class="display">
                <div id="expression">0</div>
                <div id="result">0</div>
            </div>

            <div class="buttons">

                <button class="gray" onclick="clearDisplay()">AC</button>
                <button class="gray" onclick="deleteLast()">DEL</button>
                <button class="gray" onclick="appendValue('%')">%</button>
                <button class="operator" onclick="appendValue('/')">÷</button>

                <button onclick="appendValue('7')">7</button>
                <button onclick="appendValue('8')">8</button>
                <button onclick="appendValue('9')">9</button>
                <button class="operator" onclick="appendValue('*')">×</button>

                <button onclick="appendValue('4')">4</button>
                <button onclick="appendValue('5')">5</button>
                <button onclick="appendValue('6')">6</button>
                <button class="operator" onclick="appendValue('-')">−</button>

                <button onclick="appendValue('1')">1</button>
                <button onclick="appendValue('2')">2</button>
                <button onclick="appendValue('3')">3</button>
                <button class="operator" onclick="appendValue('+')">+</button>

                <button class="zero-btn" onclick="appendValue('0')">0</button>
                <button onclick="appendValue('.')">.</button>
                <button class="equal" onclick="calculate()">=</button>

            </div>

        </div>

        <!-- CONVERTER GRID -->

        <div id="converterGridTab" class="tab-content">

            <div class="converter-main">

                <div class="converter-grid">

                    <div class="converter-item" onclick="openSpecificConverter('currency')">
                        <div class="icon">💱</div>
                        <p>Currency</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('length')">
                        <div class="icon">📏</div>
                        <p>Length</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('age')">
                        <div class="icon">🎂</div>
                        <p>Age</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('mass')">
                        <div class="icon">⚖️</div>
                        <p>Mass</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('area')">
                        <div class="icon">⬛</div>
                        <p>Area</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('time')">
                        <div class="icon">⏰</div>
                        <p>Time</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('data')">
                        <div class="icon">💾</div>
                        <p>Data</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('discount')">
                        <div class="icon">🏷️</div>
                        <p>Discount</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('volume')">
                        <div class="icon">📦</div>
                        <p>Volume</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('numeral')">
                        <div class="icon">🔁</div>
                        <p>Numeral</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('speed')">
                        <div class="icon">🚀</div>
                        <p>Speed</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('temperature')">
                        <div class="icon">🌡️</div>
                        <p>Temperature</p>
                    </div>

                    <div class="converter-item" onclick="openSpecificConverter('gst')">
                        <div class="icon">🧾</div>
                        <p>GST</p>
                    </div>

                </div>

            </div>

        </div>

        <!-- WORKSPACE -->

        <div id="converterWorkspaceTab" class="tab-content">

            <div class="converter-workspace-full">

                <div class="workspace-header">

                    <button class="back-btn" onclick="showConverterGrid()">
                        ← 
                    </button>

                    <h3 id="converterTitle">Converter</h3>

                </div>

                <div id="inputContainer">

    <div class="input-group">
        <label>Enter Value</label>

        <input type="text"
               id="inputValue"
               placeholder="Type value here">
    </div>

    <!-- DISCOUNT SECTION -->
    <div id="discountSection" style="display:none;">

        <div class="input-group">
            <label>Original Price</label>

            <input type="text"
                   id="originalPrice"
                   placeholder="Enter original price">
        </div>

        <div class="input-group">
            <label>Discount (%)</label>

            <input type="text"
                   id="discountPercent"
                   placeholder="Enter discount percentage">
        </div>

    </div>

    <!-- GST SECTION -->
<div id="gstSection" style="display:none;">

    <div class="input-group">
        <label>Original Price</label>

        <input type="text"
               id="gstOriginalPrice"
               placeholder="Enter original price">
    </div>

    <div class="gst-buttons">

        <button class="gst-btn" onclick="selectGST(3)">3%</button>

        <button class="gst-btn" onclick="selectGST(5)">5%</button>

        <button class="gst-btn" onclick="selectGST(12)">12%</button>

        <button class="gst-btn" onclick="selectGST(18)">18%</button>

        <button class="gst-btn" onclick="selectGST(28)">28%</button>

    </div>

</div>

    <div class="convert-box">
        <label>From</label>
        <select id="fromUnit"></select>
    </div>

    <div class="arrow-center">
        <div class="big-arrow">⇄</div>
    </div>

    <div class="convert-box">
        <label>To</label>
        <select id="toUnit"></select>
    </div>

</div>

                <!-- AGE -->

                <div id="ageSection" style="display:none;">

                    <div class="date-input-group">

                        <label>Birth Date</label>

                        <div class="date-selector-row">
                            <select id="birthYear" class="date-dropdown"></select>
                            <select id="birthMonth" class="date-dropdown"></select>
                            <select id="birthDay" class="date-dropdown"></select>
                        </div>

                    </div>

                    <div class="date-input-group">

                        <label>
                            To Date
                            <span class="auto-today">(Today)</span>
                        </label>

                        <div class="date-selector-row">
                            <select id="toYear" class="date-dropdown"></select>
                            <select id="toMonth" class="date-dropdown"></select>
                            <select id="toDay" class="date-dropdown"></select>
                        </div>

                    </div>

                </div>

                <button class="convert-main-btn" onclick="convertNow()">
                    Calculate
                </button>

                <div id="convertResult">
                    Result:
                </div>

            </div>

        </div>

        <!-- HISTORY -->

        <div id="historyTab" class="tab-content">

            <div class="history-box">

                <h2>Calculation History</h2>

                <ul id="historyList"></ul>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
